services:
  postgres:
    image: postgres:16
    container_name: agentforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge_password
      POSTGRES_DB: agentforge
    ports:
      - "5433:5432"
    volumes:
      - agentforge_postgres_data:/var/lib/postgresql/data

volumes:
  agentforge_postgres_data:
